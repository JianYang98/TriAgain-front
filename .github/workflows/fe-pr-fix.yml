name: FE PR Fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  fix:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest

    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          BRANCH=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName -q .headRefName)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Generate fix_prompt.md
        run: |
          {
            echo "# Frontend PR Fix Request"
            echo ""
            echo "PR: #${{ github.event.issue.number }}"
            echo "Comment: ${{ github.event.comment.body }}"
            echo ""
            echo "---"
            echo ""
            cat agents/codex_fe_fix_agent.md
            echo ""
            echo "---"
            echo ""
            cat CLAUDE.md
          } > fix_prompt.md

      - name: Generate fix result (placeholder)
        run: |
          {
            echo "## 🔧 FE Auto Fix"
            echo ""
            echo "### 적용한 수정"
            echo "- (Codex 연결 후 실제 수정 내용이 여기 표시됩니다)"
            echo ""
            echo "### 수정 이유"
            echo "- (각 수정 항목의 근거가 여기 표시됩니다)"
            echo ""
            echo "### 수정 범위"
            echo "- (변경된 파일 및 함수 목록이 여기 표시됩니다)"
            echo ""
            echo "### 주의"
            echo "- 현재는 placeholder 단계이며 실제 코드 수정은 수행하지 않음"
          } > fix_result.md

      - name: Generate fix_review_prompt.md
        run: |
          {
            echo "# Fix Review Request"
            echo ""
            echo "---"
            echo ""
            cat agents/codex_fix_review_agent.md
            echo ""
            echo "---"
            echo ""
            cat CLAUDE.md
            echo ""
            echo "---"
            echo ""
            cat fix_result.md
          } > fix_review_prompt.md

      - name: Generate fix review result (placeholder)
        run: |
          {
            echo "## ✅ FE Fix Review"
            echo ""
            echo "### 총평"
            echo "- (수정 전반에 대한 종합 평가가 여기 표시됩니다)"
            echo ""
            echo "### 영향도"
            echo "- (변경으로 인한 사이드 이펙트 및 연관 컴포넌트가 여기 표시됩니다)"
            echo ""
            echo "### 확인 필요"
            echo "- (리뷰어가 직접 확인해야 할 항목이 여기 표시됩니다)"
            echo ""
            echo "### 최종 판단"
            echo "- 현재는 placeholder 단계이며 실제 검증은 수행하지 않음"
          } > fix_review_result.md

      - name: Compose final PR comment
        run: |
          {
            cat fix_result.md
            echo ""
            echo "---"
            echo ""
            cat fix_review_result.md
          } > final_fix_comment.md

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.issue.number }} --body-file final_fix_comment.md
