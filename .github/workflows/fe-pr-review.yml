name: FE PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: |
          git diff --name-only HEAD^ HEAD > changed_files.txt

      - name: Generate review_prompt.md
        run: |
          {
            echo "# Frontend PR Review Request"
            echo ""
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "Base: ${{ github.base_ref }}"
            echo "Head: ${{ github.head_ref }}"
            echo ""
            echo "---"
            echo ""
            cat agents/codex_fe_pr_review.md
            echo ""
            echo "---"
            echo ""
            cat CLAUDE.md
            echo ""
            echo "---"
            echo ""
            echo "## Changed Files"
            cat changed_files.txt
          } > review_prompt.md

      - name: Generate review comment (placeholder)
        run: |
          {
            echo "## 🤖 FE PR Review"
            echo ""
            echo "리뷰 워크플로우가 실행되었습니다."
            echo ""
            echo "### 변경 파일"
            echo '```text'
            cat changed_files.txt
            echo '```'
            echo ""
            echo "### 상태"
            echo "- review_prompt.md 생성 완료"
            echo "- 다음 단계: Codex 실제 호출 연결"
          } > review.md

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
